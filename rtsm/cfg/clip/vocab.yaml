# CLIP zeroshot vocabulary for simple room setup (enhanced format)

templates:
  - "a photo of a {}"
  - "a cropped photo of a {}"
  - "a close-up photo of a {}"
  - "an object that is a {}"

unknown:
  # 2026-05-11 retune for resident-robot deployment.
  # Demo patch (20260430) loosened these to 0.06/0.005 for end-to-end demo-
  # clip validation. Apartment replay 2026-05-06 confirmed the loosened
  # operating point admits blur ghosts ("night light", "edge", "mirror") at
  # top-1 scores 0.04-0.11. Restoring ~2/3 toward original 0.30/0.05.
  # Resident-robot operating point favors precision over recall: false
  # negatives self-correct in days (the robot keeps observing); false
  # positives accumulate forever (LTM has no eviction yet).
  # See docs/design/persistence.md.
  min_top: 0.06     # restored to May 11 baseline; see core/pipeline.py:829
  min_margin: 0.005  # restored to May 11 baseline

classes:
  # Structural classes (wall / floor / ceiling) intentionally OMITTED here.
  # They belong in the structure-detection layer (planarity-based, see
  # rtsm/utils/mask_staging.py) which routes via Observation.struct_type
  # rather than via CLIP cosine similarity. The structure layer is currently
  # vestigial scaffolding (typed slot + planarity computation, no consumer);
  # until a structural-detection consumer ships, structural surfaces will go
  # undetected — which is preferable to being mislabeled as objects and
  # competing for WM/LTM slots. (TODO: docs/design/structure-layer.md)
  #
  # corner / edge / platform also removed: not in StructType, no architectural
  # backing, were pure CLIP attractors for blurry crops.
  #
  # Existing FAISS records with these labels (e.g. floor_001) are preserved
  # for now; cleanup deferred to structure-layer migration.

